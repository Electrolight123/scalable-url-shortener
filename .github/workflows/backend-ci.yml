name: Full Stack CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-test-and-build:
    name: Backend Test and Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: urlshortener
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d urlshortener"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7

        ports:
          - 6379:6379

        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://localhost:5432/urlshortener"
      SPRING_DATASOURCE_USERNAME: "postgres"
      SPRING_DATASOURCE_PASSWORD: "postgres"

      SPRING_DATA_REDIS_HOST: "localhost"
      SPRING_DATA_REDIS_PORT: "6379"

      APP_BASE_URL: "http://localhost:8080"
      APP_JWT_SECRET: "0123456789012345678901234567890101234567890123456789012345678901"
      APP_JWT_EXPIRATION_MS: "86400000"

      APP_RATE_LIMIT_URL_CREATION_PER_HOUR: "20"
      APP_RATE_LIMIT_REDIRECTS_PER_MINUTE: "100"

      TZ: "Asia/Kolkata"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw clean test

      - name: Build backend JAR
        run: ./mvnw package -DskipTests

      - name: Verify backend JAR
        run: |
          test -n "$(find target -maxdepth 1 -name '*.jar' ! -name '*.original' -print -quit)"
          echo "Backend JAR generated successfully"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE_URL: "http://localhost:8080"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - backend-test-and-build
      - frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build backend Docker image
        run: |
          docker build \
            --tag scalable-url-shortener-backend:ci \
            ./backend

      - name: Verify backend Docker image
        run: docker image inspect scalable-url-shortener-backend:ci

      - name: Build frontend Docker image
        run: |
          docker build \
            --tag scalable-url-shortener-frontend:ci \
            ./frontend

      - name: Verify frontend Docker image
        run: docker image inspect scalable-url-shortener-frontend:ci
